<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with UK flag colors -->
  <defs>
    <linearGradient id="ukGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#012169;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C8102E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#012169;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#ukGrad)"/>

  <!-- Crown in gold -->
  <g transform="translate(50, 50)">
    <!-- Crown base -->
    <path d="M -20,10 L -20,15 L 20,15 L 20,10 Z" fill="#FFD700"/>

    <!-- Crown points -->
    <path d="M -20,10 L -18,-5 L -12,5 L -6,-8 L 0,5 L 6,-8 L 12,5 L 18,-5 L 20,10 Z" fill="#FFD700"/>

    <!-- Crown jewels (red) -->
    <circle cx="-15" cy="-3" r="2.5" fill="#C8102E"/>
    <circle cx="-5" cy="-6" r="2.5" fill="#C8102E"/>
    <circle cx="5" cy="-6" r="2.5" fill="#C8102E"/>
    <circle cx="15" cy="-3" r="2.5" fill="#C8102E"/>
    <circle cx="0" cy="3" r="2.5" fill="#C8102E"/>
  </g>

  <!-- Border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
