<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK News Aggregator - Top Stories from Leading British Media</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>🇬🇧 UK News Aggregator</h1>
            <p class="subtitle">Latest headlines from Britain's leading news sources</p>
        </div>
    </header>

    <nav class="filter-nav">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-source="all">All</button>
                <button class="filter-btn" data-source="bbc">BBC</button>
                <button class="filter-btn" data-source="guardian">Guardian</button>
                <button class="filter-btn" data-source="telegraph">Telegraph</button>
                <button class="filter-btn" data-source="independent">Independent</button>
                <button class="filter-btn" data-source="sky">Sky News</button>
            </div>
            <button id="refresh-btn" class="refresh-btn" title="Refresh news">
                <span class="refresh-icon">🔄</span>
                <span class="refresh-text">Refresh</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading news...</p>
        </div>

        <div id="error" class="error" style="display: none;">
            <p>Failed to load news. Please try again later.</p>
        </div>

        <div id="news-grid" class="news-grid"></div>
    </main>

    <footer>
        <div class="container">
            <p>Data sourced from public RSS feeds | Last updated: <span id="last-update"></span></p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
