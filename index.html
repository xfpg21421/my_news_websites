<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英国主流媒体新闻聚合</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🇬🇧 英国主流媒体新闻</h1>
            <p class="subtitle">实时聚合英国主流媒体头版新闻</p>
        </div>
    </header>

    <nav class="filter-nav">
        <div class="container">
            <button class="filter-btn active" data-source="all">全部</button>
            <button class="filter-btn" data-source="bbc">BBC</button>
            <button class="filter-btn" data-source="guardian">卫报</button>
            <button class="filter-btn" data-source="telegraph">电讯报</button>
            <button class="filter-btn" data-source="independent">独立报</button>
            <button class="filter-btn" data-source="sky">Sky News</button>
        </div>
    </nav>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在加载新闻...</p>
        </div>

        <div id="error" class="error" style="display: none;">
            <p>加载新闻时出错，请稍后重试</p>
        </div>

        <div id="news-grid" class="news-grid"></div>
    </main>

    <footer>
        <div class="container">
            <p>数据来源于各媒体公开RSS源 | 最后更新: <span id="last-update"></span></p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
