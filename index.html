<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK News Aggregator - Top Stories from Leading British Media</title>
    <meta name="description" content="Real-time news aggregator for UK's leading media sources including BBC, The Guardian, The Telegraph, The Independent, and Sky News.">
    <meta name="keywords" content="UK news, British news, BBC, Guardian, Telegraph, Independent, Sky News, news aggregator">
    <meta name="author" content="UK News Aggregator">
    <meta name="theme-color" content="#012169">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="UK News Aggregator">
    <meta property="og:description" content="Latest headlines from Britain's leading news sources">
    <meta property="og:image" content="favicon.svg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="UK News Aggregator">
    <meta name="twitter:description" content="Latest headlines from Britain's leading news sources">

    <!-- Google AdSense Account Verification -->
    <meta name="google-adsense-account" content="ca-pub-6914086930663690">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.svg">

    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6914086930663690"
     crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>🇬🇧 UK News Aggregator</h1>
            <p class="subtitle">Latest headlines from Britain's leading news sources</p>
        </div>
    </header>

    <!-- Ad Slot 1: Horizontal Banner (Top) -->
    <div class="ad-container ad-horizontal">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6914086930663690"
             data-ad-slot="YYYYYYYYYY"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>

    <nav class="filter-nav">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-source="all">All</button>
                <button class="filter-btn" data-source="bbc">BBC</button>
                <button class="filter-btn" data-source="guardian">Guardian</button>
                <button class="filter-btn" data-source="telegraph">Telegraph</button>
                <button class="filter-btn" data-source="independent">Independent</button>
                <button class="filter-btn" data-source="sky">Sky News</button>
            </div>
            <button id="refresh-btn" class="refresh-btn" title="Refresh news">
                <span class="refresh-icon">🔄</span>
                <span class="refresh-text">Refresh</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading news...</p>
        </div>

        <div id="error" class="error" style="display: none;">
            <p>Failed to load news. Please try again later.</p>
        </div>

        <!-- Ad Slot 2: In-feed Ad (Before content) -->
        <div class="ad-container ad-infeed">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-format="fluid"
                 data-ad-layout-key="-6t+ed+2i-1n-4w"
                 data-ad-client="ca-pub-6914086930663690"
                 data-ad-slot="YYYYYYYYYY"></ins>
        </div>

        <div id="news-grid" class="news-grid"></div>

        <!-- Ad Slot 3: In-feed Ad (After content) -->
        <div class="ad-container ad-infeed">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-format="fluid"
                 data-ad-layout-key="-6t+ed+2i-1n-4w"
                 data-ad-client="ca-pub-6914086930663690"
                 data-ad-slot="YYYYYYYYYY"></ins>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Data sourced from public RSS feeds | Last updated: <span id="last-update"></span></p>
        </div>
    </footer>

    <!-- Ad Slot 4: Sticky Sidebar Ad (Desktop only) -->
    <div class="ad-sidebar">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6914086930663690"
             data-ad-slot="YYYYYYYYYY"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>

    <script src="js/app.js"></script>

    <!-- Initialize AdSense ads -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
        (adsbygoogle = window.adsbygoogle || []).push({});
        (adsbygoogle = window.adsbygoogle || []).push({});
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
